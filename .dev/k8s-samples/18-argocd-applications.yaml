# Larger Helm-based Application to demo long source diffs (many parameters,
# changed/added/removed entries between revisions).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-platform
  namespace: kubeli-demo
spec:
  project: platform
  source:
    repoURL: https://github.com/example/platform-charts.git
    path: charts/platform
    targetRevision: v3.5.0
    helm:
      releaseName: platform
      valueFiles:
        - values.yaml
        - values-prod.yaml
      parameters:
        - name: image.repository
          value: registry.example.com/platform/api
        - name: image.tag
          value: v3.5.0
        - name: replicaCount
          value: "5"
  destination:
    server: https://kubernetes.default.svc
    namespace: platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
status:
  sync:
    status: Synced
    revision: f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1
  health:
    status: Healthy
  history:
    - id: 0
      revision: "1122334455667788990011223344556677889900"
      deployedAt: "2026-06-08T10:00:00Z"
      source:
        repoURL: https://github.com/example/platform-charts.git
        path: charts/platform
        targetRevision: v3.3.0
        helm:
          releaseName: platform
          valueFiles:
            - values.yaml
          parameters:
            - name: image.repository
              value: registry.example.com/platform/api
            - name: image.tag
              value: v3.3.0
            - name: replicaCount
              value: "2"
            - name: resources.requests.cpu
              value: 250m
            - name: resources.requests.memory
              value: 256Mi
            - name: ingress.enabled
              value: "false"
    - id: 1
