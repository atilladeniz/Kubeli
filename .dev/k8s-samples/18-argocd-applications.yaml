                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: kubernetes.io/arch
                          operator: In
                          values:
                            - amd64
          parameters:
            - name: image.repository
              value: registry.example.com/platform/api
            - name: image.tag
              value: v3.4.0
            - name: image.pullPolicy
              value: IfNotPresent
            - name: replicaCount
              value: "3"
            - name: resources.requests.cpu
              value: 500m
            - name: resources.requests.memory
              value: 512Mi
            - name: resources.limits.cpu
              value: 1000m
            - name: resources.limits.memory
              value: 1Gi
            - name: ingress.enabled
