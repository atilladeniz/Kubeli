name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4
        id: filter
        with:
          filters: |
            app:
              - 'src/**'
              - 'src-tauri/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig*.json'
              - 'vite.config.*'
              - 'vitest.config.*'
              - 'eslint.config.*'
              - 'tests/**'
              - 'e2e/**'
            web:
              - 'web/**'

  build-web:
    name: Astro Build
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: needs.detect-changes.outputs.web == 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node.js
        # Astro >=6 requires Node >=22.12. Bun does not override the runtime
        # of the astro CLI's `#!/usr/bin/env node` shebang, so we still need
        # a matching system node alongside bun.
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install dependencies
        working-directory: web
        run: bun install

      - name: Build Astro
        working-directory: web
        run: bun run build

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: web-dist
          path: web/dist/
          retention-days: 1

  deploy-web:
    name: Deploy Landing Page
    runs-on: ubuntu-latest
    needs: [build-web]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: web-dist
          path: dist/

      # Incremental sync: compares local file hashes against the server-side
      # .ftp-deploy-sync-state.json and uploads only changed/new files, deleting
      # ones it previously uploaded that are now gone. Files it never uploaded
      # (release installers sharing this web root) are not in the state file, so
      # they are left untouched — no dangerous-clean-slate. Cuts the job from
      # "re-upload every file" to "upload the diff".
      - name: Deploy to FTP (incremental)
        uses: SamKirkland/FTP-Deploy-Action@110f9186c050f71550953127052e77650219c287 # v4.4.0
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: dist/
          server-dir: ${{ secrets.DEPLOY_LANDING_FTP_PATH }}/

  tauri-versions:
    name: Tauri Version Sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'

      - name: Check tauri crate vs @tauri-apps/api versions
        run: node scripts/check-tauri-versions.mjs

  lint-frontend:
    name: Frontend Lint & Type Check
    needs: [detect-changes]
    if: needs.detect-changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          if [ "${{ github.actor }}" = "dependabot[bot]" ]; then
            npm install --package-lock-only --ignore-scripts
            npm ci
          else
            npm ci
          fi

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript check
        run: npm run typecheck

  test-frontend:
    name: Frontend Unit Tests
    needs: [detect-changes]
    if: needs.detect-changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          if [ "${{ github.actor }}" = "dependabot[bot]" ]; then
            npm install --package-lock-only --ignore-scripts
            npm ci
          else
            npm ci
          fi

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload frontend coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: frontend-coverage
          path: coverage/
          retention-days: 7

  lint-backend:
    name: Backend Lint & Clippy
    needs: [detect-changes]
    if: needs.detect-changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: '0'
      CARGO_PROFILE_DEV_DEBUG: '0'
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: clippy, rustfmt

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - name: Cache Cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
          shared-key: ubuntu-rust-lint
          cache-on-failure: true

      - name: Check formatting
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Create dummy frontend dist for Tauri compile check
        run: mkdir -p dist && echo '<!DOCTYPE html><html><body></body></html>' > dist/index.html

      - name: Run Clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

  test-backend:
    name: Backend Unit Tests
    needs: [detect-changes]
    if: needs.detect-changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: '0'
      CARGO_PROFILE_TEST_DEBUG: '0'
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - name: Cache Cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
          shared-key: ubuntu-rust-test
          cache-on-failure: true

      - name: Create dummy frontend dist for Tauri compile check
        run: mkdir -p dist && echo '<!DOCTYPE html><html><body></body></html>' > dist/index.html

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@9458fed45835344deb5e69e06e831be047c96abf # cargo-llvm-cov

      - name: Run Rust tests with coverage
        working-directory: src-tauri
        run: cargo llvm-cov --lcov --output-path ../coverage-rust.lcov

      - name: Upload Rust coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: rust-coverage
          path: coverage-rust.lcov
          retention-days: 7

  test-e2e:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    needs: [detect-changes, lint-frontend]
    if: needs.detect-changes.outputs.app == 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          if [ "${{ github.actor }}" = "dependabot[bot]" ]; then
            npm install --package-lock-only --ignore-scripts
            npm ci
          else
            npm ci
          fi

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(npx playwright --version | tr ' ' '-')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Install Playwright system deps only (browsers cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: Run Playwright tests
        run: npm run test:e2e

  build:
    if: false # Temporarily disabled; re-enable when macOS build is ready.
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [detect-changes, lint-frontend, lint-backend, test-backend]
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: |
          if [ "${{ github.actor }}" = "dependabot[bot]" ]; then
            npm install --package-lock-only --ignore-scripts
            npm ci
          else
            npm ci
          fi

      - name: Build Frontend
        run: npm run build

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --verbose
