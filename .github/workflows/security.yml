name: Security Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Weekly scan every Monday at 6 AM UTC
  workflow_dispatch:

concurrency:
  group: security-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

env:
  TRIVY_CACHE_DIR: .cache/trivy

jobs:
  trivy:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Cache Trivy DB
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ${{ env.TRIVY_CACHE_DIR }}
          key: trivy-db-${{ runner.os }}-${{ github.run_id }}
          restore-keys: trivy-db-${{ runner.os }}-

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: |
          if [ "${{ github.actor }}" = "dependabot[bot]" ]; then
            npm install --package-lock-only --ignore-scripts
            npm ci
          else
            npm ci
          fi

      - name: Generate npm SBOM
        run: npx @cyclonedx/cyclonedx-npm --spec-version 1.5 --omit dev --output-format JSON --output-file sbom-npm.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Install cargo-cyclonedx
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2
        with:
          tool: cargo-cyclonedx@0.5.7

      - name: Generate Rust SBOM
        run: |
          cd src-tauri
          cargo cyclonedx --format json --spec-version 1.5 --no-build-deps --override-filename sbom-rust
          mv sbom-rust.json ../sbom-rust.json

      - name: Scan npm SBOM with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: 'sbom'
          scan-ref: 'sbom-npm.json'
          trivy-config: trivy.yaml
          format: 'sarif'
          output: 'trivy-npm.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'
          cache-dir: ${{ env.TRIVY_CACHE_DIR }}

      - name: Scan Rust SBOM with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: 'sbom'
          scan-ref: 'sbom-rust.json'
          trivy-config: trivy.yaml
          format: 'sarif'
          output: 'trivy-rust.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'
          cache-dir: ${{ env.TRIVY_CACHE_DIR }}

      - name: Scan filesystem for secrets and misconfigs
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          trivy-config: trivy.yaml
          format: 'sarif'
          output: 'trivy-fs.sarif'
          severity: 'HIGH,CRITICAL'
          scanners: 'secret,misconfig'
          exit-code: '0'
          cache-dir: ${{ env.TRIVY_CACHE_DIR }}
          skip-dirs: '.dev,node_modules,target'

      - name: Fix Trivy npm SARIF artifact locations
        if: always() && hashFiles('trivy-npm.sarif') != ''
        run: |
          node -e '
            const fs = require("fs");
            const s = JSON.parse(fs.readFileSync("trivy-npm.sarif","utf8"));
            for (const run of s.runs||[]) {
              for (const r of run.results||[]) {
                for (const loc of r.locations||[]) {
                  if (!loc.physicalLocation) loc.physicalLocation = {};
                  const al = loc.physicalLocation.artifactLocation;
                  if (!al) {
                    loc.physicalLocation.artifactLocation = { uri: "package-lock.json" };
                  } else if (!al.uri) {
                    al.uri = "package-lock.json";
                  }
                }
              }
            }
            fs.writeFileSync("trivy-npm.sarif", JSON.stringify(s, null, 2));
          '

      - name: Upload Trivy npm results to Security tab
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        if: always() && hashFiles('trivy-npm.sarif') != ''
        with:
          sarif_file: 'trivy-npm.sarif'
          category: 'trivy-npm'

      - name: Fix Trivy Rust SARIF artifact locations
        if: always() && hashFiles('trivy-rust.sarif') != ''
        run: |
          # Trivy SBOM scans produce results with empty artifactLocation uri
          # which CodeQL rejects. Patch empty URIs with a placeholder path.
          node -e '
            const fs = require("fs");
            const s = JSON.parse(fs.readFileSync("trivy-rust.sarif","utf8"));
            for (const run of s.runs||[]) {
              for (const r of run.results||[]) {
                for (const loc of r.locations||[]) {
                  if (!loc.physicalLocation) loc.physicalLocation = {};
                  const al = loc.physicalLocation.artifactLocation;
                  if (!al) {
                    loc.physicalLocation.artifactLocation = { uri: "src-tauri/Cargo.lock" };
                  } else if (!al.uri) {
                    al.uri = "src-tauri/Cargo.lock";
                  }
                }
              }
            }
            fs.writeFileSync("trivy-rust.sarif", JSON.stringify(s, null, 2));
          '

      - name: Upload Trivy Rust results to Security tab
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        if: always() && hashFiles('trivy-rust.sarif') != ''
        with:
          sarif_file: 'trivy-rust.sarif'
          category: 'trivy-rust'

      - name: Upload Trivy fs results to Security tab
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        if: always() && hashFiles('trivy-fs.sarif') != ''
        with:
          sarif_file: 'trivy-fs.sarif'
          category: 'trivy-fs'

      - name: Upload Trivy artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always() && (hashFiles('trivy-npm.sarif') != '' || hashFiles('trivy-rust.sarif') != '' || hashFiles('trivy-fs.sarif') != '')
        with:
          name: trivy-results
          path: |
            trivy-npm.sarif
            trivy-rust.sarif
            trivy-fs.sarif
          if-no-files-found: ignore
          retention-days: 30

  cargo-deny:
    name: Cargo Deny (Licenses, Bans, Sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
          shared-key: ubuntu-rust-deny

      - name: Install cargo-deny
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2
        with:
          tool: cargo-deny

      - name: Run cargo-deny
        working-directory: src-tauri
        run: cargo deny check

  cargo-audit:
    name: Cargo Audit (RustSec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2
        with:
          tool: cargo-audit

      - name: Run cargo-audit
        working-directory: src-tauri
        # Ignores mirror src-tauri/deny.toml. quick-xml DoS (RUSTSEC-2026-0194/0195)
        # is patched only in >= 0.41; transitive via plist -> tauri which pin 0.39
        # (no upgrade path), and only parses trusted local plists -> not reachable.
        run: cargo audit --ignore RUSTSEC-2026-0194 --ignore RUSTSEC-2026-0195

  lockfile-lint:
    name: Lockfile Integrity Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Lint lockfile registry sources
        run: npx lockfile-lint --type npm --path package-lock.json --validate-https --allowed-hosts npm

  semgrep:
    name: Semgrep SAST Scan
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Run Semgrep scan
        run: |
          semgrep scan \
            --config p/default \
            --config p/secrets \
            --config p/typescript \
            --config p/react \
            --config p/rust \
            --config .semgrep.yaml \
            --exclude-rule javascript.lang.security.audit.unsafe-formatstring.unsafe-formatstring \
            --exclude-rule rust.lang.security.current-exe.current-exe \
            --exclude-rule javascript.lang.security.audit.detect-non-literal-regexp.detect-non-literal-regexp \
            --sarif \
            --output semgrep.sarif \
            --metrics off
        continue-on-error: true

      - name: Upload Semgrep results to Security tab
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        if: always()
        with:
          sarif_file: 'semgrep.sarif'
          category: 'semgrep'

      - name: Upload Semgrep artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: semgrep-results
          path: semgrep.sarif
          retention-days: 30
